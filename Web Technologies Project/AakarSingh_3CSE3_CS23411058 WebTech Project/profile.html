<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - StudyBuddy AI</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">StudyBuddy <span class="ai-badge">AI</span></div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="index.html">Home</a></li>
            <li><a href="courses.html">Courses</a></li>
            <li><a href="profile.html" class="active">Profile</a></li>
        </ul>
    </nav>

    <main class="dashboard" style="max-width: 800px;">
        <div class="card" style="padding: 40px; margin-top: 40px; display: flex; align-items: center; gap: 30px;">
            <!-- Profile Avatar Placeholder -->
            <div style="width: 120px; height: 120px; border-radius: 50%; background: var(--accent-gradient); display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: bold; color: white;">
                A
            </div>
            
            <div style="flex: 1;">
                <h1 id="profile-name" style="font-size: 2.2rem; margin-bottom: 15px;">Aakar</h1>
                <p id="profile-bio" style="color: var(--text-secondary); margin-bottom: 20px;">AI Engineering Student • Learning Path: Data Science</p>
                <div id="profile-skills" style="display: flex; gap: 10px;">
                    <span class="tag tag-high">Python</span>
                    <span class="tag tag-high">Machine Learning</span>
                    <span class="tag tag-medium">Web Dev</span>
                </div>
            </div>
            
            <div>
                <a href="edit-profile.html" class="btn-secondary" style="text-decoration: none; display: inline-block;">Edit Profile</a>
                <button id="logout-btn" class="btn-secondary" style="margin-top: 15px; width: 100%; border-color: #f87171; color: #ef4444; cursor: pointer; transition: 0.2s;">Logout</button>
            </div>
        </div>

        <section class="recommendations" style="margin-top: 40px;">
            <div class="section-header">
                <h2>Learning Preferences</h2>
            </div>
            <div class="card" style="padding: 30px;">
                <div style="margin-bottom: 20px;">
                    <h3 style="margin-bottom: 10px; font-size: 1.1rem;">Preferred Content Type</h3>
                    <div style="display: flex; gap: 15px;">
                        <button class="btn-primary" style="padding: 8px 15px; font-size: 0.9rem;">Interactive Video</button>
                        <button class="btn-secondary" style="padding: 8px 15px; font-size: 0.9rem;">Text / Articles</button>
                    </div>
                </div>
                
                <div>
                     <h3 style="margin-bottom: 10px; font-size: 1.1rem;">Daily Goal</h3>
                     <p id="profile-goal-display" style="color: var(--text-secondary);">2 Hours / Day</p>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
